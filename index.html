<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QUIC Chat</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-box{
    width:700px;
    height:600px;
    background:#1e293b;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    padding:20px;
    background:#334155;
    font-size:24px;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    background:#2563eb;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.input-area{
    display:flex;
    padding:20px;
    gap:10px;
    background:#334155;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
}

button{
    padding:15px 20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="container">

<div class="chat-box">

<div class="header">
QUIC Private Chat
</div>

<div class="messages" id="messages"></div>

<div class="input-area">

<input
id="target"
placeholder="Send to username"
/>

<input
id="message"
placeholder="Type message"
/>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

<script>

const username = prompt("Enter username")

const socket = new WebSocket("ws://localhost:8080/ws")

socket.onopen = () => {

    socket.send(username)
}

socket.onmessage = (event) => {

    const messages = document.getElementById("messages")

    const div = document.createElement("div")

    div.className = "message"

    div.innerText = event.data

    messages.appendChild(div)
}

function sendMessage(){

    const target = document.getElementById("target").value

    const message = document.getElementById("message").value

    socket.send(target + "|" + message)

    document.getElementById("message").value = ""
}

</script>

</body>
</html>
